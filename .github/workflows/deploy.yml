name: Deploy to dmitrysmagin.github.io

on:
  push:
    branches: [master]

env:
  HTML_ROOT: https://dmitrysmagin.github.io

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to dmitrysmagin.github.io
        uses: peaceiris/actions-gh-pages@v4
        with:
          deploy_key: ${{ secrets.DEPLOY_KEY }}
          external_repository: dmitrysmagin/dmitrysmagin.github.io
          publish_branch: master
          publish_dir: ./dist
